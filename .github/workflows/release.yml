name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Determine release tag
        id: ref
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
              Write-Error "Tag '$tag' does not match expected format v#.#.#"
              exit 1
            }
            echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          } else {
            echo "TAG=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - uses: actions/checkout@v3
        with:
          ref: ${{ steps.ref.outputs.TAG }}

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ steps.ref.outputs.TAG }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build single-file executable
        run: >
          dotnet publish src/BlockFromRecent/BlockFromRecent.csproj
          -c Release -r win-x64 --self-contained true
          /p:PublishSingleFile=true
          /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Build Inno Setup installer
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.version.outputs.VERSION }}
          src/BlockFromRecent/installer.iss

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ steps.ref.outputs.TAG }}"
          "src/BlockFromRecent/bin/Release/net8.0-windows/win-x64/publish/BlockFromRecent.exe"
          "installer/output/BlockFromRecent-Setup-${{ steps.version.outputs.VERSION }}.exe"
          --title "${{ steps.ref.outputs.TAG }}"
          --generate-notes
