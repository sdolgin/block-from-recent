name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
permissions:
  contents: read
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Restore NuGet packages
        run: dotnet restore
      - name: Build in Release mode
        run: dotnet build --configuration Release --no-restore
      - name: Run unit tests
        run: dotnet test --configuration Release --no-build
